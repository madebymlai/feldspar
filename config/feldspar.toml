[feldspar]
db_path = "feldspar.db"
model_path = "feldspar.model"
recap_every = 3

[trace_review]
api_key_env = "OPENROUTER_API_KEY"
model = "openai/gpt-oss-20b:nitro"

[thresholds]
confidence_gap = 25
over_analysis_multiplier = 1.5
overthinking_multiplier = 2.0

[budgets]
minimal = [2, 3]
standard = [3, 5]
deep = [5, 8]

[pruning]
no_outcome_days = 30
low_quality_days = 15
with_outcome_days = 90

# Skill-mapped thinking modes
# Each mode defines: required fields, budget tier, what feldspar watches for

[modes.brainstorm]
requires = []
budget = "standard"
watches = "Must extract requirements not solutions, must probe gaps, must not jump to how"

[modes.architecture]
requires = ["components"]
budget = "deep"
watches = "Must name components, must estimate impact, must explore alternatives"

[modes.problem-solving]
requires = ["evidence"]
budget = "deep"
watches = "Must cite evidence, must explore alternatives, must not assume root cause"

[modes.planning]
requires = ["components"]
budget = "standard"
watches = "Must cover all components from arch, must scope tasks atomically, must not skip steps"

[modes.debugging]
requires = ["evidence"]
budget = "standard"
watches = "Must cite file paths/logs/stack traces, must verify claims, must cite threat model for security"

[modes.implementation]
requires = []
budget = "minimal"
watches = "Must stay focused on task scope, must not redesign, must not overthink"

[modes.pattern-matching]
requires = ["evidence"]
budget = "standard"
watches = "Must cite specific claims from source, must verify each against target, must not skip mismatches"

[modes.orchestrator]
requires = []
budget = "minimal"
watches = "Must delegate not solve, must not go past 2-3 thoughts without spawning specialist, must route to correct skill"

[components]
valid = []  # populate per project
